name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Tally Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Copy APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/Tally_Android_v1_7.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tally_Android_v1_7_APK
          path: artifacts/Tally_Android_v1_7.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Tally_Android_build_reports
          path: |
            app/build/reports
            app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 7
