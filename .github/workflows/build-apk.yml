name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build installable Tally APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee build.log

      - name: Prepare named APK
        if: success()
        run: cp app/build/outputs/apk/debug/app-debug.apk Tally_Android_v1_7.apk

      - name: Upload installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Tally_Android_v1_7_APK
          path: Tally_Android_v1_7.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tally_Android_build_diagnostics
          path: |
            build.log
            app/build/reports/**
          if-no-files-found: warn
          retention-days: 7
